<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写给甘祺的一句话/用一首歌/歌词描述她 · 20岁生日</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif SC',serif;background:#faf7f3;color:#3a3228;min-height:100vh;overflow-x:hidden}

.petals{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.petal{position:absolute;animation:petalFall var(--d,9s) ease-in-out infinite var(--delay,0s);opacity:0}
@keyframes petalFall{
  0%{transform:translateY(-20px) translateX(0) rotate(0deg);opacity:0}
  10%{opacity:.75}
  85%{opacity:.5}
  100%{transform:translateY(105vh) translateX(var(--sway,20px)) rotate(200deg);opacity:0}
}

.page{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:3rem 1.25rem 5rem}

.hero{text-align:center;margin-bottom:2.5rem}
.date-pill{display:inline-block;font-size:11px;letter-spacing:.12em;color:#a07c6a;border:0.5px solid #ddd0c4;border-radius:20px;padding:5px 16px;margin-bottom:1.25rem;background:#fff}
.hero-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:400;font-style:italic;line-height:1.25;color:#2e241c;margin-bottom:.75rem}
.hero-sub{font-size:13px;color:#9a8878;line-height:1.8;max-width:340px;margin:0 auto}

.countdown{display:flex;gap:10px;justify-content:center;margin-bottom:2rem}
.cd-block{text-align:center;background:#fff;border:0.5px solid #e8ddd4;border-radius:12px;padding:10px 18px;min-width:64px}
.cd-num{font-family:'Playfair Display',serif;font-size:26px;color:#2e241c;display:block}
.cd-label{font-size:10px;letter-spacing:.08em;color:#b8a898;margin-top:2px;display:block}
.cd-ended{font-size:13px;color:#9a8878;text-align:center;padding:.75rem;border:0.5px solid #e8ddd4;border-radius:10px;margin-bottom:2rem;background:#fff}

.player{display:flex;align-items:center;gap:12px;background:#fff;border:0.5px solid #e8ddd4;border-radius:14px;padding:12px 16px;margin-bottom:2rem}
.play-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid #e0d4ca;background:#faf7f3;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#a07c6a;font-size:14px;transition:background .15s}
.play-btn:hover{background:#f0e8e0}
.song-title{font-size:13px;color:#3a3228;font-family:'Playfair Display',serif;font-style:italic}
.song-artist{font-size:11px;color:#b8a898;margin-top:2px}
.music-wave{display:flex;align-items:center;gap:2px;height:16px}
.bar{width:2px;border-radius:2px;background:#c8a898;animation:wave 1.2s ease-in-out infinite;transform-origin:bottom}
.bar:nth-child(1){height:6px;animation-delay:0s}
.bar:nth-child(2){height:10px;animation-delay:.15s}
.bar:nth-child(3){height:14px;animation-delay:.3s}
.bar:nth-child(4){height:8px;animation-delay:.45s}
.bar:nth-child(5){height:12px;animation-delay:.6s}
@keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.music-wave.paused .bar{animation-play-state:paused}

.mode-wrap{display:flex;gap:10px;margin-bottom:1.25rem}
.mode-btn{flex:1;padding:16px 12px;border-radius:14px;border:0.5px solid #e0d4ca;background:#fff;color:#9a8878;font-size:13px;cursor:pointer;text-align:center;transition:all .18s;line-height:1.6;font-family:'Noto Serif SC',serif}
.mode-btn .micon{font-size:22px;display:block;margin-bottom:6px;color:#c8b8a8}
.mode-btn.active{background:#fdf5ef;border-color:#c8a898;color:#7a5848}
.mode-btn.active .micon{color:#a07c6a}
.mode-btn:hover{border-color:#c8b8a8}

textarea{width:100%;min-height:110px;background:#fff;border:0.5px solid #e0d4ca;border-radius:12px;color:#3a3228;font-size:14px;padding:14px;resize:vertical;font-family:'Noto Serif SC',serif;line-height:1.85;transition:border-color .15s}
textarea:focus{outline:none;border-color:#c8a898}
textarea::placeholder{color:#c8bdb4}
.char-count{font-size:11px;color:#c8bdb4;text-align:right;margin:.5rem 0}
.notice{font-size:11px;color:#b8a898;margin-bottom:1rem;line-height:1.7;padding:10px 14px;background:#fdfaf7;border-radius:8px;border-left:2px solid #e0cfc4}
.submit-btn{width:100%;padding:13px;border-radius:12px;border:0.5px solid #c8a898;background:#fdf5ef;color:#7a5848;font-size:14px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:.05em;transition:all .15s}
.submit-btn:hover{background:#f5e8dc}
.submit-btn:active{transform:scale(.99)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

.divider{border:none;border-top:0.5px solid #ede4da;margin:2rem 0}
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.feed-label{font-size:12px;color:#b8a898;letter-spacing:.06em}
.count-pill{font-size:11px;color:#b8a898;border:0.5px solid #e0d4ca;border-radius:20px;padding:3px 12px;background:#fff}

.msg-card{background:#fff;border:0.5px solid #ede4da;border-radius:14px;padding:16px;margin-bottom:10px;transition:border-color .15s}
.msg-card:hover{border-color:#c8a898}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tag{font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.04em}
.tag-song{background:#f0eaff;color:#7c60b8;border:0.5px solid #ddd0f8}
.tag-letter{background:#fdf0ea;color:#b07050;border:0.5px solid #f0d8c8}
.msg-anon{font-size:11px;color:#d0c4b8}
.msg-text{font-size:14px;color:#4a3c30;line-height:1.85;white-space:pre-wrap}
.empty-state{text-align:center;padding:3rem 0;color:#c8bdb4;font-size:13px;line-height:2}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:#fff;border:0.5px solid #e0d4ca;border-radius:10px;padding:10px 22px;font-size:13px;color:#7a5848;opacity:0;pointer-events:none;transition:all .25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.admin-link{text-align:center;margin-top:3rem}
.admin-link a{font-size:11px;color:#ddd0c4;text-decoration:none}
.admin-link a:hover{color:#b8a898}
.closed-banner{background:#fdf5ef;border:0.5px solid #e8d8ca;border-radius:12px;padding:1.25rem;text-align:center;margin-bottom:2rem}
.closed-banner p{font-size:13px;color:#a07c6a;line-height:1.8}
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="page" id="mainPage">
  <div class="hero">
    <div class="date-pill">6月28日 · 甘祺的20岁</div>
    <h1 class="hero-title">写给甘祺的一句话/用一首歌/歌词描述她</h1>
    <p class="hero-sub">匿名留言，你不需要署名<br>发表即默认可能出现在她的 vlog 里</p>
  </div>

  <div id="countdownWrap" class="countdown">
    <div class="cd-block"><span class="cd-num" id="cd-h">--</span><span class="cd-label">小时</span></div>
    <div class="cd-block"><span class="cd-num" id="cd-m">--</span><span class="cd-label">分钟</span></div>
    <div class="cd-block"><span class="cd-num" id="cd-s">--</span><span class="cd-label">秒</span></div>
  </div>

  <div class="player">
    <div class="play-btn" onclick="togglePlay()" id="playBtn">
      <i class="ti ti-player-play" id="playIcon"></i>
    </div>
    <div style="flex:1;min-width:0">
      <div class="song-title">Carry You</div>
      <div class="song-artist">Novo Amor</div>
    </div>
    <div class="music-wave paused" id="waveAnim">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>
  <!-- 把 Carry You 的 mp3 文件放在同目录，命名为 carry-you.mp3 -->
  <audio id="audio" loop src="carry-you.mp3"></audio>

  <div id="submitArea" style="display:none">
    <div class="mode-wrap">
      <div class="mode-btn active" id="btnSong" onclick="setMode('song')">
        <span class="micon"><i class="ti ti-music"></i></span>
        用一首歌 / 一句歌词<br>描绘她
      </div>
      <div class="mode-btn" id="btnLetter" onclick="setMode('letter')">
        <span class="micon"><i class="ti ti-feather"></i></span>
        想对她 / 20岁的她<br>说的话
      </div>
    </div>
    <textarea id="msgInput" placeholder="想到她，你脑海里浮现的第一句话是什么…" maxlength="300" oninput="updateCount()"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 300</div>
    <div class="notice">✦ 完全匿名 · 甘祺看不到你是谁 · 留言需经她审核后才会出现在这里 · 可多次留言</div>
    <button class="submit-btn" id="submitBtn" onclick="submitMsg()">留下来</button>
  </div>

  <div id="closedBanner" class="closed-banner" style="display:none">
    <p>留言通道已于6月29日零点关闭<br>感谢每一位为她留下文字的人 ✦</p>
  </div>

  <hr class="divider">

  <div class="feed-header">
    <span class="feed-label">大家都说了什么</span>
    <span class="count-pill" id="countPill">0 条</span>
  </div>
  <div id="feed"><div class="empty-state">还没有留言出现在这里<br>来第一个吧 ✦</div></div>

  <div class="admin-link"><a href="admin.html">· · ·</a></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 🔧 填入你的 Supabase 配置（见部署说明）
// ============================================================
const SUPABASE_URL = 'https://lzzesegumdzdfspngbsu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6emVzZWd1bWR6ZGZzcG5nYnN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjczMzEsImV4cCI6MjA5ODEwMzMzMX0.e_tWTbp7MVxDP3y6bvzritmMMApkt567g2j-zv_AT9c';
// ============================================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BIRTHDAY = new Date('2026-06-28T00:00:00+08:00');
const DEADLINE  = new Date('2026-06-29T00:00:00+08:00');
let mode = 'song';
let playing = false;

// 花瓣
(function(){
  const c = document.getElementById('petals');
  const colors = ['#f9d0d8','#f5c6d8','#f0d8ee','#fce0d0','#f8d4e4','#f2daf0','#fad8cc'];
  for(let i = 0; i < 28; i++){
    const el = document.createElement('div');
    el.className = 'petal';
    const w = 8 + Math.random()*12;
    const h = w * (0.55 + Math.random()*.3);
    const sway = (Math.random()>.5?1:-1)*(15+Math.random()*35);
    el.style.cssText = [
      `left:${Math.random()*100}%`,
      `width:${w}px`,`height:${h}px`,
      `background:${colors[Math.floor(Math.random()*colors.length)]}`,
      `--d:${7+Math.random()*9}s`,`--delay:-${Math.random()*14}s`,
      `--sway:${sway}px`,
      `border-radius:${60+Math.random()*30}% ${Math.random()*20}% ${60+Math.random()*30}% ${Math.random()*20}%`
    ].join(';');
    c.appendChild(el);
  }
})();

// 倒计时
function updateCountdown(){
  const now = new Date();
  if(now >= DEADLINE){
    document.getElementById('countdownWrap').innerHTML = '<div class="cd-ended">留言通道已关闭 · 感谢所有留言 ✦</div>';
    document.getElementById('submitArea').style.display = 'none';
    document.getElementById('closedBanner').style.display = 'block';
    return;
  }
  const target = now < BIRTHDAY ? BIRTHDAY : DEADLINE;
  const diff = target - now;
  document.getElementById('cd-h').textContent = String(Math.floor(diff/3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  document.getElementById('submitArea').style.display = now >= BIRTHDAY ? 'block' : 'none';
}
setInterval(updateCountdown, 1000);
updateCountdown();

// 音乐
function togglePlay(){
  const audio = document.getElementById('audio');
  playing = !playing;
  playing ? audio.play() : audio.pause();
  document.getElementById('playIcon').className = playing ? 'ti ti-player-pause' : 'ti ti-player-play';
  document.getElementById('waveAnim').classList.toggle('paused', !playing);
}

// 模式
function setMode(m){
  mode = m;
  document.getElementById('btnSong').classList.toggle('active', m==='song');
  document.getElementById('btnLetter').classList.toggle('active', m==='letter');
  document.getElementById('msgInput').placeholder = m==='song'
    ? '一首歌名、一行歌词，或是那个旋律让你想到了她…'
    : '想对她说的话，或者想对20岁说的话，都可以…';
}
function updateCount(){
  document.getElementById('charCount').textContent = document.getElementById('msgInput').value.length;
}

// 提交留言
async function submitMsg(){
  const text = document.getElementById('msgInput').value.trim();
  if(!text) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '发送中…';
  const { error } = await db.from('messages').insert({ mode, text, approved: false });
  btn.disabled = false;
  btn.textContent = '留下来';
  if(error){ showToast('出了点问题，请重试'); return; }
  document.getElementById('msgInput').value = '';
  updateCount();
  showToast('已收到，等待甘祺审核后发布 ✦');
}

// 读取已审核留言
async function loadFeed(){
  const { data, error } = await db
    .from('messages')
    .select('*')
    .eq('approved', true)
    .order('created_at', { ascending: false });
  if(error || !data) return;
  const feed = document.getElementById('feed');
  document.getElementById('countPill').textContent = data.length + ' 条';
  if(!data.length){
    feed.innerHTML = '<div class="empty-state">还没有留言出现在这里<br>来第一个吧 ✦</div>';
    return;
  }
  feed.innerHTML = data.map(m => `
    <div class="msg-card">
      <div class="msg-meta">
        <span class="tag ${m.mode==='song'?'tag-song':'tag-letter'}">${m.mode==='song'?'♪ 歌词':'✦ 心里话'}</span>
        <span class="msg-anon">匿名 · ${timeAgo(m.created_at)}</span>
      </div>
      <p class="msg-text">${esc(m.text)}</p>
    </div>`).join('');
}

// 实时刷新
db.channel('public-feed')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadFeed())
  .subscribe();

loadFeed();

function timeAgo(iso){
  const s = Math.floor((Date.now() - new Date(iso))/1000);
  if(s<60) return '刚刚';
  if(s<3600) return Math.floor(s/60)+' 分钟前';
  if(s<86400) return Math.floor(s/3600)+' 小时前';
  return Math.floor(s/86400)+' 天前';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
