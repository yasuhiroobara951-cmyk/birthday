<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 甘祺生日留言墙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif SC',serif;background:#faf7f3;color:#3a3228;min-height:100vh}
.page{max-width:560px;margin:0 auto;padding:2.5rem 1.25rem 5rem}

.top{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.back-btn{background:#fff;border:0.5px solid #e0d4ca;border-radius:8px;color:#9a8878;padding:7px 14px;cursor:pointer;font-size:12px;font-family:'Noto Serif SC',serif;text-decoration:none}
.page-title{font-size:16px;color:#3a3228;font-family:'Playfair Display',serif;font-style:italic}

/* login */
#loginBox p{font-size:13px;color:#9a8878;margin-bottom:1rem}
input[type=password]{width:100%;background:#fff;border:0.5px solid #e0d4ca;border-radius:10px;color:#3a3228;font-size:14px;padding:12px 14px;margin-bottom:10px;font-family:'Noto Serif SC',serif}
input[type=password]:focus{outline:none;border-color:#c8a898}
.login-btn{width:100%;padding:12px;border-radius:10px;border:0.5px solid #c8a898;background:#fdf5ef;color:#7a5848;font-size:13px;cursor:pointer;font-family:'Noto Serif SC',serif}
.login-btn:hover{background:#f5e8dc}
.err{font-size:12px;color:#c07070;margin-top:8px;display:none}

/* stats */
.stats{display:flex;gap:10px;margin-bottom:1.5rem}
.stat{flex:1;background:#fff;border:0.5px solid #e8ddd4;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:24px;color:#2e241c;font-family:'Playfair Display',serif}
.stat-label{font-size:11px;color:#b8a898;margin-top:4px}

.section-label{font-size:12px;color:#b8a898;letter-spacing:.06em;margin-bottom:1rem}
.divider{border:none;border-top:0.5px solid #ede4da;margin:1.5rem 0}

/* cards */
.msg-card{background:#fff;border:0.5px solid #ede4da;border-radius:12px;padding:14px;margin-bottom:10px}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tag{font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.04em}
.tag-song{background:#f0eaff;color:#7c60b8;border:0.5px solid #ddd0f8}
.tag-letter{background:#fdf0ea;color:#b07050;border:0.5px solid #f0d8c8}
.msg-time{font-size:11px;color:#d0c4b8}
.msg-text{font-size:14px;color:#4a3c30;line-height:1.8;margin-bottom:14px;white-space:pre-wrap}
.actions{display:flex;gap:8px}
.approve-btn{flex:1;padding:8px;border-radius:8px;border:0.5px solid #b8d8b0;background:#f0faf0;color:#5a9050;font-size:12px;cursor:pointer;font-family:'Noto Serif SC',serif}
.reject-btn{padding:8px 16px;border-radius:8px;border:0.5px solid #e0d4ca;background:#fff;color:#b8a898;font-size:12px;cursor:pointer;font-family:'Noto Serif SC',serif}
.approve-btn:hover{background:#e0f5e0}
.reject-btn:hover{background:#faf7f3}

.approved-card{background:#fdfaf7;border:0.5px solid #ede4da;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.approved-text{font-size:13px;color:#9a8878;line-height:1.75;flex:1;white-space:pre-wrap}

.empty{font-size:13px;color:#c8bdb4;padding:.5rem 0}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:#fff;border:0.5px solid #e0d4ca;border-radius:10px;padding:10px 22px;font-size:13px;color:#7a5848;opacity:0;pointer-events:none;transition:all .25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <a class="back-btn" href="index.html">← 返回</a>
    <span class="page-title">管理后台</span>
  </div>

  <div id="loginBox">
    <p>请输入管理员密码</p>
    <input type="password" id="pwInput" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">进入</button>
    <p class="err" id="loginErr">密码不对，再试试</p>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="statPending">0</div><div class="stat-label">待审核</div></div>
      <div class="stat"><div class="stat-num" id="statApproved">0</div><div class="stat-label">已发布</div></div>
    </div>

    <div class="section-label">待审核留言</div>
    <div id="pendingFeed"></div>

    <div class="divider"></div>
    <div class="section-label">已发布留言</div>
    <div id="approvedFeed"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 🔧 填入你的 Supabase 配置（与 index.html 相同）
// ============================================================
const SUPABASE_URL = 'https://lzzesegumdzdfspngbsu.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'sb_publishable_s3hUDvbva4P4tgkcNOObXQ_GpdBksfp';
// ============================================================
const ADMIN_PW = '162828';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function doLogin(){
  if(document.getElementById('pwInput').value === ADMIN_PW){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAll();
    // 实时监听新留言
    db.channel('admin-feed')
      .on('postgres_changes', { event:'*', schema:'public', table:'messages' }, () => loadAll())
      .subscribe();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

async function loadAll(){
  const { data } = await db.from('messages').select('*').order('created_at', { ascending: false });
  if(!data) return;
  const pending  = data.filter(m => !m.approved);
  const approved = data.filter(m => m.approved);
  document.getElementById('statPending').textContent  = pending.length;
  document.getElementById('statApproved').textContent = approved.length;
  renderPending(pending);
  renderApproved(approved);
}

function renderPending(list){
  const el = document.getElementById('pendingFeed');
  if(!list.length){ el.innerHTML = '<div class="empty">暂无待审核留言</div>'; return; }
  el.innerHTML = list.map(m => `
    <div class="msg-card">
      <div class="msg-meta">
        <span class="tag ${m.mode==='song'?'tag-song':'tag-letter'}">${m.mode==='song'?'♪ 歌词':'✦ 心里话'}</span>
        <span class="msg-time">${timeAgo(m.created_at)}</span>
      </div>
      <p class="msg-text">${esc(m.text)}</p>
      <div class="actions">
        <button class="approve-btn" onclick="approve('${m.id}')">发布</button>
        <button class="reject-btn"  onclick="reject('${m.id}')">不发布</button>
      </div>
    </div>`).join('');
}

function renderApproved(list){
  const el = document.getElementById('approvedFeed');
  if(!list.length){ el.innerHTML = '<div class="empty">还没有已发布的留言</div>'; return; }
  el.innerHTML = list.map(m => `
    <div class="approved-card">
      <span class="tag ${m.mode==='song'?'tag-song':'tag-letter'}" style="flex-shrink:0;margin-top:2px">${m.mode==='song'?'♪':'✦'}</span>
      <p class="approved-text">${esc(m.text)}</p>
      <button onclick="unapprove('${m.id}')" style="flex-shrink:0;background:none;border:none;color:#d0c4b8;cursor:pointer;font-size:16px;padding:0 0 0 8px" title="撤回">×</button>
    </div>`).join('');
}

async function approve(id){
  await db.from('messages').update({ approved: true }).eq('id', id);
  showToast('已发布 ✦');
  loadAll();
}
async function reject(id){
  await db.from('messages').delete().eq('id', id);
  showToast('已删除');
  loadAll();
}
async function unapprove(id){
  await db.from('messages').update({ approved: false }).eq('id', id);
  showToast('已撤回');
  loadAll();
}

function timeAgo(iso){
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return '刚刚';
  if(s<3600) return Math.floor(s/60)+' 分钟前';
  if(s<86400) return Math.floor(s/3600)+' 小时前';
  return Math.floor(s/86400)+' 天前';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
